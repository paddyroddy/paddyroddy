---
name: Update README

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:
  schedule:
    - cron: 0 9 * * *
  workflow_dispatch:

jobs:
  markscribe:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate-token
        # yamllint disable-line rule:line-length
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.README_APP_ID }}
          # yamllint disable-line rule:line-length
          private-key: ${{ secrets.README_APP_PRIVATE_KEY }} # zizmor: ignore[secrets-outside-env]

      - name: Checkout source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: true
          ref: ${{ github.head_ref }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Find the last commit to README
        id: commit-count
        run: >-
          echo count="$(git log --oneline --since=midnight main -- ./README.md |
          wc -l)" >> "$GITHUB_OUTPUT"

      - name: Autogenerate README
        if: ${{ steps.commit-count.outputs.count == 0 }}
        # yamllint disable-line rule:line-length
        uses: muesli/readme-scribe@5a187a2a36ef894335f17a7d01c32b0e28c6d948 # v0.1
        env:
          # yamllint disable-line rule:line-length
          GITHUB_TOKEN: ${{ secrets.README_SCRIBE }} # zizmor: ignore[secrets-outside-env]
        with:
          template: ./templates/README.md.tpl
          writeTo: ./README.md

      - name: Push README to main
        if: >-
          ${{ steps.commit-count.outputs.count == 0 && github.ref ==
          'refs/heads/main' }}
        # yamllint disable-line rule:line-length
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7
        with:
          branch: main
          commit_message: Update generated README
          commit_author: readme-scribe 🤖 <actions@github.com>
          commit_user_email: actions@github.com
          commit_user_name: readme-scribe 🤖
