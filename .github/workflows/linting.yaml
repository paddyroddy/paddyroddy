---
name: Linting

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  linting:
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/linting@adc326866cad594fb01cda599145d603345baa8f # v0
        with:
          pre-commit-config: ./.pre-commit-config.yaml
