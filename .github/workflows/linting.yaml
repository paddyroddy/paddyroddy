---
name: Linting

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:

jobs:
  linting:
    permissions:
      contents: read
    runs-on: ubuntu-slim
    steps:
      # yamllint disable-line rule:line-length
      - uses: paddyroddy/.github/actions/linting@3b5a73012982bdeb04d02bcf81cc28bdfe5d4ee5 # v0
        with:
          pre-commit-config: ./.pre-commit-config.yaml
